apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: hackathon
  labels:
    app.kubernetes.io/name: auth-service
type: Opaque
stringData:
  # Direct Datadog metrics export is disabled in configmap.yaml because the app sends
  # metrics/traces through the in-cluster Datadog Agent. Keep these empty unless direct
  # Datadog API export is intentionally enabled.
  DATADOG_API_KEY: ""
  DATADOG_APP_KEY: ""
