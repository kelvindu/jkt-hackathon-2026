apiVersion: batch/v1
kind: Job
metadata:
  name: ops-simulator
  namespace: hackathon
  labels:
    app.kubernetes.io/name: ops-simulator
    app.kubernetes.io/part-of: jkt-hackathon-2026
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ops-simulator
        app.kubernetes.io/part-of: jkt-hackathon-2026
    spec:
      restartPolicy: Never
      containers:
        - name: ops-simulator
          image: 681244251312.dkr.ecr.ap-southeast-3.amazonaws.com/ops-simulator:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: ops-simulator-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
