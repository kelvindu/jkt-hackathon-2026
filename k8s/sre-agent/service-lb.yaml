apiVersion: v1
kind: Service
metadata:
  name: sre-agent-lb
  namespace: hackathon
  labels:
    app.kubernetes.io/name: sre-agent
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: sre-agent
  ports:
    - name: http
      port: 80
      targetPort: http
