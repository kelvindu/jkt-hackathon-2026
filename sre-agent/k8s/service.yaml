apiVersion: v1
kind: Service
metadata:
  name: sre-agent
  namespace: hackathon
  labels:
    app: sre-agent
spec:
  type: ClusterIP
  selector:
    app: sre-agent
  ports:
    - name: http
      port: 9000
      targetPort: http
---
