# The "production" service the agent investigates and remediates.
# Build/push from ../auth-service (its own Dockerfile) and set the image below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: hackathon
  labels:
    app: auth-service
    tags.datadoghq.com/service: auth-service
    tags.datadoghq.com/env: hackathon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tags.datadoghq.com/service: auth-service
        tags.datadoghq.com/env: hackathon
    spec:
      containers:
        - name: auth-service
          image: <ECR_REGISTRY>/auth-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_SERVICE
              value: "auth-service"
            - name: DD_ENV
              value: "hackathon"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: hackathon
  labels:
    app: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8080
      targetPort: http
