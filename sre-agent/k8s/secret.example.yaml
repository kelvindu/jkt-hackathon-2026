# Copy to secret.yaml and fill in real values, then `kubectl apply -f secret.yaml`.
# DO NOT commit the filled-in version. (k8s Secret data is base64; stringData is plain.)
apiVersion: v1
kind: Secret
metadata:
  name: sre-agent-secrets
  namespace: hackathon
type: Opaque
stringData:
  DD_API_KEY: "<YOUR_DATADOG_API_KEY>"
  DD_APP_KEY: "<YOUR_DATADOG_APP_KEY>"
  AWS_ACCESS_KEY_ID: "<YOUR_AWS_KEY>"
  AWS_SECRET_ACCESS_KEY: "<YOUR_AWS_SECRET>"
  # RCA destination — Google Chat incoming webhook (key+token embedded)
  GOOGLE_CHAT_WEBHOOK_URL: "https://chat.googleapis.com/v1/spaces/<SPACE>/messages?key=<KEY>&token=<TOKEN>"
