apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-agent
  namespace: hackathon
  labels:
    app: sre-agent
    tags.datadoghq.com/service: sre-incident-agent
    tags.datadoghq.com/env: hackathon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-agent
  template:
    metadata:
      labels:
        app: sre-agent
        tags.datadoghq.com/service: sre-incident-agent
        tags.datadoghq.com/env: hackathon
      annotations:
        ad.datadoghq.com/sre-agent.logs: '[{"source":"python","service":"sre-incident-agent"}]'
    spec:
      containers:
        - name: sre-agent
          # Replace <ECR_REGISTRY> with your ECR repo, e.g.
          # 1234567890.dkr.ecr.us-east-1.amazonaws.com/sre-agent:latest
          image: <ECR_REGISTRY>/sre-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9000
          envFrom:
            - configMapRef:
                name: sre-agent-config
            - secretRef:
                name: sre-agent-secrets
          env:
            # Agentless LLM Observability — no local DD Agent needed.
            - name: DD_LLMOBS_ENABLED
              value: "1"
            - name: DD_LLMOBS_AGENTLESS_ENABLED
              value: "1"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # Writable scratch so ddtrace/python can spool with a read-only rootfs.
        - name: tmp
          emptyDir: {}
